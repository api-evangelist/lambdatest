meters:
  - name: Live Testing Sessions
    unit: parallel_session_minutes
    aggregation: sum
  - name: Web Automation Parallel Sessions
    unit: parallel_session_license
    aggregation: max
  - name: Real Device Test Minutes
    unit: minutes
    aggregation: sum
  - name: HyperExecute Execution Minutes
    unit: minutes
    aggregation: sum
  - name: KaneAI Agentic Sessions
    unit: sessions
    aggregation: sum
principles:
  - name: Visibility
    description: >-
      Track LambdaTest consumption monthly across live testing, automation,
      HyperExecute, and KaneAI agent tiers. Separate cost centers by testing
      type (web, mobile, AI-native) to identify spend drivers.
  - name: Optimization
    description: >-
      Right-size parallel session licenses to actual peak concurrency observed
      in CI/CD pipelines. Monitor HyperExecute minute burn rate versus the
      free 300-minute tier before upgrading. Evaluate KaneAI agent utilization
      (500 sessions/month included) before adding agents.
  - name: Accountability
    description: >-
      Assign LambdaTest costs to engineering teams or squads by tagging test
      projects. Use the Analytics API to attribute test execution costs to
      specific repos or products.
