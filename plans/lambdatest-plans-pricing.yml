specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: LambdaTest
providerId: lambdatest
created: '2026-06-12'
modified: '2026-06-12'
reconciled: true
tags:
  - Testing
  - Cross-Browser Testing
  - Automation
  - Mobile Testing
description: >-
  LambdaTest (TestMu AI) pricing is modular, structured around testing type:
  live browser testing, web automation, mobile real device automation, and
  AI-native execution via HyperExecute and KaneAI. Plans start at $0 and
  scale by parallel sessions, device access, and AI agent capacity. Annual
  billing offers up to 20% savings.
sources:
  - https://www.lambdatest.com/pricing
plans:
  - id: lambdatest-free
    name: Free
    type: freemium
    description: >-
      Free-for-life plan with limited live interactive cross-browser testing
      minutes (60 minutes/month), access to 3,000+ browsers, and 2 parallel
      sessions. No credit card required.
    entries:
      - label: Live Testing Minutes
        name: live_testing_minutes
        type: quota
        metric: minutes
        limit: 60
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Parallel Sessions
        name: parallel_sessions
        type: quota
        metric: sessions
        limit: 2
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false

  - id: lambdatest-virtual-live
    name: Virtual Live
    type: paid
    description: >-
      Unlimited live interactive testing across 3,000+ browsers and operating
      systems. Billed annually at $15/month per user.
    entries:
      - label: Monthly Price (Annual Billing)
        name: monthly_price_annual
        type: metered
        metric: per_user_per_month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '15.00'
        userMultiplied: true
      - label: Live Testing
        name: live_testing_unlimited
        type: boolean
        metric: feature
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false

  - id: lambdatest-chromeos-live
    name: ChromeOS Live
    type: paid
    description: >-
      Live testing including ChromeOS coverage for seamless cross-platform
