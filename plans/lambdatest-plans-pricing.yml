        type: metered
        metric: per_user_per_month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '29.00'
        userMultiplied: true
      - label: ChromeOS Testing
        name: chromeos_testing
        type: boolean
        metric: feature
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false

