aid: lambdatest
name: LambdaTest
description: >-
  LambdaTest (rebranding as TestMu AI) is a cloud-based AI-powered test
  execution platform that enables developers and QA teams to run Selenium,
  Cypress, Playwright, and Appium automation tests across 3,000+ browser
  and OS combinations at scale. The platform provides live interactive
  cross-browser and real device testing, visual regression testing with
  SmartUI, and AI-native test orchestration via HyperExecute. LambdaTest
  exposes a suite of REST APIs for managing test sessions, uploading mobile
  apps, retrieving test results, and controlling tunnel connections, all
  secured with HTTP Basic Authentication using a username and access key.
  The platform serves over 2 million developers and testers across 10,000+
  enterprise customers in 130 countries.
type: Index
