apis:
  - aid: lambdatest:web-automation-api
    name: LambdaTest Web Automation API
    description: >-
      REST API for managing Selenium, Cypress, and Playwright test sessions
      on the LambdaTest cloud grid. Enables retrieval of test builds, test
      sessions, screenshots, video recordings, and network logs. Uses HTTP
      Basic Authentication with username and access key credentials.
    humanURL: https://www.lambdatest.com/support/docs/api-doc/
    baseURL: https://api.lambdatest.com
    tags:
      - Web Automation
      - Selenium
      - Cypress
      - Playwright
      - Test Sessions
    properties:
      - type: Documentation
        url: https://www.lambdatest.com/support/docs/api-doc/
      - type: OpenAPI
        url: https://swagger-api-support.lambdatest.com/index.html
      - type: OpenAPI
        url: openapi/lambdatest-web-automation-api-openapi.yml

  - aid: lambdatest:app-automation-api
    name: LambdaTest App Automation API
    description: >-
      REST API for managing mobile app test automation on real devices and
      emulators/simulators. Supports uploading iOS (.ipa) and Android
      (.apk/.aab) apps, listing devices by region, managing app versions,
      and retrieving concurrency details. Base URLs differ between real
      device and virtual device workflows.
    humanURL: https://www.lambdatest.com/support/docs/app-testing-apis/
    baseURL: https://mobile-api.lambdatest.com
    tags:
      - Mobile Testing
      - App Automation
      - iOS
      - Android
      - Real Devices
    properties:
      - type: Documentation
        url: https://www.lambdatest.com/support/docs/app-testing-apis/

  - aid: lambdatest:smartui-api
    name: LambdaTest SmartUI API
    description: >-
      REST API for visual regression testing and screenshot comparison.
      Allows programmatic control of SmartUI visual testing sessions,
      baseline management, and comparison results. Swagger/OpenAPI 3.0
      specification is publicly available.
    humanURL: https://www.lambdatest.com/support/docs/smart-ui-cypress/
    baseURL: https://api.lambdatest.com
    tags:
      - Visual Regression
      - Screenshot Testing
      - SmartUI
    properties:
      - type: Documentation
        url: https://www.lambdatest.com/support/docs/smart-ui-cypress/
      - type: OpenAPI
        url: https://swagger-api-support.lambdatest.com/smartui/index.html
      - type: OpenAPI
        url: openapi/lambdatest-smartui-api-openapi.yml

  - aid: lambdatest:hyperexecute-api
    name: LambdaTest HyperExecute API
    description: >-
      REST API for the HyperExecute AI-native test orchestration platform.
      Provides endpoints for triggering distributed test jobs, monitoring
      job status, fetching artifacts, and retrieving execution analytics.
      HyperExecute runs test suites up to 70% faster than traditional grids.
    humanURL: https://www.lambdatest.com/support/docs/hyperexecute-api-testing/
    baseURL: https://api.lambdatest.com
    tags:
      - HyperExecute
      - Test Orchestration
      - Parallel Testing
      - CI/CD
    properties:
      - type: Documentation
        url: https://www.lambdatest.com/support/docs/hyperexecute-api-testing/

